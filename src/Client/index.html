<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Baseline Content-Security-Policy. 'unsafe-inline'/'unsafe-eval' are required by the
      Vite dev toolchain (HMR) and Mantine inline styles. For PRODUCTION, enforce a stricter
      policy as an HTTP header at the reverse proxy / static host (script-src 'self'; no eval),
      and add frame-ancestors 'none' (meta cannot set frame-ancestors). See docs/security.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://localhost:5000 ws://localhost:5000 ws://localhost:5173; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; base-uri 'self'; form-action 'self'; object-src 'none'" />
    <title>יד שרה — רפואה דחופה</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
