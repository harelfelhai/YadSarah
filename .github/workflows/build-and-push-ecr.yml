name: Build and push to ECR

# Builds the single Docker image (root Dockerfile — client + API + runtime) and pushes it
# to Amazon ECR. Auth is via GitHub OIDC — NO long-lived AWS keys are stored in GitHub.
#
# ── One-time AWS setup required before this runs (guided in the migration runbook, step 2) ──
#   1. Create an ECR repository named "yadsarah" in eu-central-1.
#   2. IAM → Identity providers → add an OIDC provider for GitHub:
#        Provider URL: https://token.actions.githubusercontent.com
#        Audience:     sts.amazonaws.com
#   3. IAM → Roles → create a role "github-actions-ecr-push":
#        - Trusted entity: Web identity → the GitHub OIDC provider above
#        - Condition: token.actions.githubusercontent.com:sub = repo:harelfelhai/YadSarah:*
#        - Permissions: AmazonEC2ContainerRegistryPowerUser (or a scoped ECR-push policy)
#   4. GitHub → repo Settings → Secrets and variables → Actions → Variables → New repository
#      variable  AWS_ROLE_ARN = arn:aws:iam::938145531510:role/github-actions-ecr-push
#
# Trigger: automatically on push to main, or manually from the Actions tab (Run workflow).

on:
  push:
    branches: [ main, deploy/render ]
  workflow_dispatch: {}

permissions:
  id-token: write   # required for the OIDC token exchange
  contents: read

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: yadsarah

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_REPOSITORY:latest" \
            .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"
          echo "Pushed $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
